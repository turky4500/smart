<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إرسال رسالة واتساب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
        
        * {
            font-family: 'Tajawal', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        
        .btn-gradient {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            transition: all 0.3s ease;
        }
        
        .btn-gradient:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }
        
        .btn-gradient:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .file-item {
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .progress-bar {
            transition: width 0.3s ease;
        }
        
        input[type="file"]::file-selector-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            margin-left: 1rem;
            transition: all 0.3s ease;
        }
        
        input[type="file"]::file-selector-button:hover {
            transform: scale(1.05);
        }
        
        .toast-enter {
            animation: toastIn 0.4s ease forwards;
        }
        
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-2xl">
        <div class="glass rounded-3xl p-6 md:p-10">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-green-400 to-green-600 mb-4 shadow-lg">
                    <i class="fab fa-whatsapp text-white text-3xl"></i>
                </div>
                <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-2">إرسال رسالة واتساب</h1>
                <p class="text-gray-600">أرسل رسائل مع مرفقات بسهولة</p>
            </div>

            <!-- Form -->
            <form id="whatsappForm" class="space-y-6">
                <!-- Phone Number -->
                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-phone ml-2 text-green-600"></i>
                        رقم الهاتف
                    </label>
                    <div class="relative">
                        <input 
                            type="tel" 
                            id="phone" 
                            name="phone"
                            placeholder="مثال: 966512345678"
                            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-green-500 focus:ring-2 focus:ring-green-200 transition-all outline-none text-left"
                            dir="ltr"
                            required>
                        <div class="absolute left-3 top-3.5 text-gray-400">
                            <i class="fas fa-mobile-alt"></i>
                        </div>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">أدخل الرقم مع رمز الدولة بدون + أو 00</p>
                </div>

                <!-- Message -->
                <div>
                    <label for="message" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-comment-dots ml-2 text-green-600"></i>
                        نص الرسالة
                    </label>
                    <textarea 
                        id="message" 
                        name="message"
                        rows="4"
                        placeholder="اكتب رسالتك هنا..."
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-green-500 focus:ring-2 focus:ring-green-200 transition-all outline-none resize-none"
                        required></textarea>
                </div>

                <!-- File Upload -->
                <div>
                    <label for="files" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-paperclip ml-2 text-green-600"></i>
                        ارفاق ملفات
                    </label>
                    <div class="relative">
                        <input 
                            type="file" 
                            id="files" 
                            name="files"
                            multiple
                            accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt"
                            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-green-500 focus:ring-2 focus:ring-green-200 transition-all outline-none bg-white cursor-pointer">
                    </div>
                    <p class="text-xs text-gray-500 mt-1">يمكنك اختيار صور، PDF، مستندات Word, Excel, PowerPoint</p>
                    
                    <!-- Files List -->
                    <div id="filesList" class="mt-4 space-y-2"></div>
                </div>

                <!-- Progress Bar -->
                <div id="progressContainer" class="hidden">
                    <div class="flex justify-between text-sm text-gray-600 mb-2">
                        <span>جاري المعالجة...</span>
                        <span id="progressText">0%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
                        <div id="progressBar" class="progress-bar h-2.5 rounded-full bg-gradient-to-r from-green-400 to-green-600" style="width: 0%"></div>
                    </div>
                </div>

                <!-- Send Button -->
                <button 
                    type="submit" 
                    id="sendBtn"
                    class="w-full btn-gradient text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-3 text-lg">
                    <i class="fab fa-whatsapp text-xl"></i>
                    <span id="btnText">إرسال الرسالة</span>
                    <i id="btnLoader" class="fas fa-spinner fa-spin hidden"></i>
                </button>
            </form>

            <!-- Toast Container -->
            <div id="toastContainer" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 w-full max-w-md px-4"></div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-6 text-white text-sm">
            <p>© 2024 جميع الحقوق محفوظة</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://corsproxy.io/?https://api.ultramsg.com/instance12345/api/send-message';
        const TOKEN = 'sau11zbtz1ruma8o2k5tt';
        
        let selectedFiles = [];
        
        const form = document.getElementById('whatsappForm');
        const filesInput = document.getElementById('files');
        const filesList = document.getElementById('filesList');
        const sendBtn = document.getElementById('sendBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const toastContainer = document.getElementById('toastContainer');

        // Handle file selection
        filesInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                if (!selectedFiles.find(f => f.name === file.name && f.size === file.size)) {
                    selectedFiles.push(file);
                }
            });
            updateFilesList();
            filesInput.value = '';
        });

        // Update files list UI
        function updateFilesList() {
            filesList.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item flex items-center justify-between bg-gray-50 p-3 rounded-lg border border-gray-200';
                
                const icon = getFileIcon(file.type);
                const size = formatFileSize(file.size);
                
                fileItem.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 min-w-0">
                        <div class="text-2xl ${icon.color}">
                            <i class="${icon.class}"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-gray-800 truncate">${file.name}</p>
                            <p class="text-xs text-gray-500">${size}</p>
                        </div>
                    </div>
                    <button 
                        type="button"
                        onclick="removeFile(${index})"
                        class="text-red-500 hover:text-red-700 transition-colors p-2">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                filesList.appendChild(fileItem);
            });
        }

        // Remove file from list
        window.removeFile = function(index) {
            selectedFiles.splice(index, 1);
            updateFilesList();
        }

        // Get file icon based on type
        function getFileIcon(type) {
            if (type.startsWith('image/')) return { class: 'fas fa-file-image', color: 'text-purple-500' };
            if (type === 'application/pdf') return { class: 'fas fa-file-pdf', color: 'text-red-500' };
            if (type.includes('word')) return { class: 'fas fa-file-word', color: 'text-blue-600' };
            if (type.includes('excel') || type.includes('spreadsheet')) return { class: 'fas fa-file-excel', color: 'text-green-600' };
            if (type.includes('powerpoint') || type.includes('presentation')) return { class: 'fas fa-file-powerpoint', color: 'text-orange-600' };
            return { class: 'fas fa-file', color: 'text-gray-500' };
        }

        // Format file size
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Convert file to base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    const base64 = reader.result.split(',')[1];
                    resolve(base64);
                };
                reader.onerror = error => reject(error);
            });
        }

        // Show toast notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-500' : 'bg-red-500';
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            
            toast.className = `toast-enter ${bgColor} text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 mb-2`;
            toast.innerHTML = `
                <i class="fas ${icon} text-xl"></i>
                <span class="flex-1 font-medium">${message}</span>
                <button onclick="this.parentElement.remove()" class="hover:bg-white/20 rounded p-1 transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            `;
            
            toastContainer.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value.trim();
            const message = document.getElementById('message').value.trim();
            
            if (!phone || !message) {
                showToast('يرجى ملء جميع الحقول المطلوبة', 'error');
                return;
            }
            
            // Disable button and show loader
            sendBtn.disabled = true;
            btnText.textContent = 'جاري الإرسال...';
            btnLoader.classList.remove('hidden');
            
            try {
                // Show progress if files exist
                if (selectedFiles.length > 0) {
                    progressContainer.classList.remove('hidden');
                }
                
                // Convert files to base64
                const media = [];
                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];
                    const base64 = await fileToBase64(file);
                    media.push({
                        filename: file.name,
                        mimetype: file.type || 'application/octet-stream',
                        data: base64
                    });
                    
                    // Update progress
                    const progress = Math.round(((i + 1) / selectedFiles.length) * 100);
                    progressBar.style.width = progress + '%';
                    progressText.textContent = progress + '%';
                }
                
                // Prepare request payload
                const payload = {
                    token: TOKEN,
                    to: phone,
                    body: message,
                    media: media
                };
                
                // Send request
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.sent === true || data.message === 'ok' || data.status === 'success') {
                    showToast('تم إرسال الرسالة بنجاح ✓', 'success');
                    form.reset();
                    selectedFiles = [];
                    updateFilesList();
                } else {
                    throw new Error(data.message || 'فشل إرسال الرسالة');
                }
                
            } catch (error) {
                console.error('Error:', error);
                showToast('حدث خطأ أثناء الإرسال: ' + error.message, 'error');
            } finally {
                // Reset UI
                sendBtn.disabled = false;
                btnText.textContent = 'إرسال الرسالة';
                btnLoader.classList.add('hidden');
                progressContainer.classList.add('hidden');
                progressBar.style.width = '0%';
                progressText.textContent = '0%';
            }
        });

        // Phone number validation
        document.getElementById('phone').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
