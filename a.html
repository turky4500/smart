<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أمانة منطقة الرياض - الشركات المعتمدة</title>
    <meta name="description" content="البوابة الرقمية لاستعراض الشركات المعتمدة لدى أمانة منطقة الرياض">
    
    <!-- ربط ملف التنسيقات -->
    <link rel="stylesheet" href="style.css">
    
    <!-- GoatCounter Analytics (مستخلص من الكود الأصلي للإحصائيات المخفية) -->
    <script data-goatcounter="https://tur100.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>

    <div class="page-container">
        
        <!-- زر تبديل الوضع الداكن/الفاتح -->
        <div class="theme-toggle-container">
            <button class="theme-toggle-btn" id="theme-toggle" aria-label="تبديل المظهر">
                <!-- أيقونة الشمس (تظهر في الوضع الداكن) -->
                <svg id="theme-icon-sun" style="display: none;" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="4"></circle>
                    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
                </svg>
                <!-- أيقونة القمر (تظهر في الوضع الفاتح) -->
                <svg id="theme-icon-moon" viewBox="0 0 24 24">
                    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                </svg>
            </button>
        </div>

        <!-- الهوية البصرية لأمانة منطقة الرياض -->
        <header class="header">
            <div class="logo-right">
                <h1>أمانة منطقة الرياض</h1>
                <p>الإدارة العامة لتقنية المعلومات والخدمات الرقمية</p>
            </div>
            <div class="logo-left">
                <div class="emblem-title">RIYADH MUNICIPALITY</div>
                <div class="emblem-subtitle">المملكة العربية السعودية</div>
            </div>
        </header>

        <!-- منطقة محتوى عرض الشركات -->
        <main class="content">
            <div class="content-header">
                <div class="document-title">الشركات المعتمدة</div>
                
                <!-- شريط البحث السريع للزوار -->
                <div class="search-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                    <input type="text" id="search-input" class="search-input" placeholder="ابحث عن شركة..." aria-label="البحث عن الشركات">
                </div>
            </div>
            
            <!-- حاوية قائمة الشركات المعتمدة (تولد ديناميكياً) -->
            <div class="company-list" id="company-list">
                <!-- سيتم ملؤها بواسطة Javascript من ملف CSV -->
            </div>
            
            <div class="no-results" id="no-results">
                لا توجد شركات مطابقة لبحثك. يرجى التأكد من معيار البحث وكتابة الاسم بشكل صحيح.
            </div>
        </main>

        <!-- فوتر الصفحة -->
        <footer class="footer">
            <p>© أمانة منطقة الرياض 1447هـ - 2026م. نسخة الاطلاع الرقمي المعتمد.</p>
        </footer>

    </div>

    <!-- ربط ملف المنطق البرمجي والبيانات -->
    <script src="app.js"></script>
</body>
</html>
