<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إرسال رسالة واتساب</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ece5dd;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #075e54;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }
        input[type="text"]:focus, textarea:focus {
            border-color: #25d366;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #25d366;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #128c7e;
        }
        #statusMessage {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
        .success { color: #25d366; }
        .error { color: #d9534f; }
        .loading { color: #f0ad4e; }
    </style>
</head>
<body>

    <div class="container">
        <h2>إرسال واتساب 💬</h2>
        <form id="whatsappForm">
            <div class="form-group">
                <label for="phone">رقم الجوال:</label>
                <input type="text" id="phone" placeholder="مثال: 966511111111" required>
            </div>
            
            <div class="form-group">
                <label for="message">نص الرسالة:</label>
                <textarea id="message" rows="5" placeholder="اكتب رسالتك هنا..." required></textarea>
            </div>

            <button type="submit" id="sendBtn">إرسال الرسالة</button>
        </form>

        <div id="statusMessage"></div>
    </div>

    <script>
        document.getElementById('whatsappForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // منع إعادة تحميل الصفحة

            // جلب القيم من المربعات
            const phone = document.getElementById('phone').value.trim();
            const message = document.getElementById('message').value.trim();
            const statusDiv = document.getElementById('statusMessage');
            const sendBtn = document.getElementById('sendBtn');

            // إعداد حالة التحميل
            statusDiv.textContent = 'جاري الإرسال...';
            statusDiv.className = 'loading';
            sendBtn.disabled = true;

            // بناء البيانات المرسلة حسب الـ API الخاص بك
            const payload = {
                to: [phone],
                body: message
            };

            // التوكن الخاص بك
            const token = "sau11zbtz1ruma8o2k5tt";

            try {
                // إرسال الطلب إلى الخادم
                const response = await fetch("https://wats-enzn.onrender.com/api/send-message", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        // إرسال التوكن في الهيدر (الطريقة الأكثر شيوعاً)
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    statusDiv.textContent = '✅ تم إرسال الرسالة بنجاح!';
                    statusDiv.className = 'success';
                    document.getElementById('whatsappForm').reset(); // تفريغ الحقول
                } else {
                    const errorData = await response.json();
                    statusDiv.textContent = '❌ فشل الإرسال: ' + (errorData.message || 'خطأ غير معروف');
                    statusDiv.className = 'error';
                }
            } catch (error) {
                statusDiv.textContent = '❌ حدث خطأ في الاتصال بالخادم.';
                statusDiv.className = 'error';
                console.error('Error:', error);
            } finally {
                sendBtn.disabled = false; // إعادة تفعيل الزر
            }
        });
    </script>

</body>
</html>
