<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بلدي | المدقق الذكي - سير العمل الكامل</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
    body { background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .container { max-width: 950px; width: 100%; background: #fff; border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.1); padding: 30px 25px; }
    h1 { text-align: center; color: #0b3b5c; margin-bottom: 5px; }
    .subtitle { text-align: center; color: #2c7da0; margin-bottom: 25px; font-weight: 500; }
    .steps { display: flex; justify-content: space-between; margin-bottom: 30px; }
    .step { text-align: center; flex: 1; position: relative; color: #aaa; font-weight: bold; font-size: 14px; }
    .step.active { color: #0b3b5c; }
    .step::before { content: attr(data-num); display: block; width: 32px; height: 32px; background: #ccc; border-radius: 50%; margin: 0 auto 6px; line-height: 32px; color: #fff; font-weight: bold; }
    .step.active::before { background: #0b3b5c; }
    .step.done::before { background: #2a9d8f; content: "✓"; }
    .panel { background: #f8fafc; border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
    label { display: block; margin-bottom: 6px; font-weight: 600; color: #1e293b; }
    select, input[type="text"], .fake-upload, button { width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid #cbd5e1; font-size: 15px; background: #fff; margin-bottom: 15px; }
    .fake-upload { display: flex; justify-content: space-between; align-items: center; cursor: pointer; color: #0b3b5c; font-weight: 500; background: #f1f5f9; }
    .row { display: flex; gap: 15px; flex-wrap: wrap; }
    .row input { flex: 1 1 45%; }
    #map { height: 280px; border-radius: 12px; border: 1px solid #cbd5e1; margin: 10px 0; z-index: 0; }
    .btn { background: #0b3b5c; color: #fff; border: none; padding: 12px 28px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; width: auto; display: inline-block; }
    .btn:hover { background: #145374; }
    .btn:disabled { background: #94a3b8; cursor: not-allowed; }
    .result-box { margin-top: 25px; padding: 20px; border-radius: 16px; font-weight: bold; text-align: center; font-size: 18px; }
    .success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
    .reject { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .warning-text { color: #b91c1c; font-size: 14px; }
    .hint { font-size: 14px; color: #475569; margin-top: 5px; }
    .btn-sm { padding: 8px 18px; font-size: 14px; }
    .inline { display: flex; gap: 10px; align-items: center; }
  </style>
</head>
<body>
<div class="container">
  <h1>🏛️ بلدي</h1>
  <div class="subtitle">المدقق الذكي الاستباقي · سير العمل المتكامل</div>

  <div class="steps">
    <div class="step active" data-num="1">نوع المنشأة</div>
    <div class="step" data-num="2">السجل التجاري</div>
    <div class="step" data-num="3">عقد الإيجار</div>
    <div class="step" data-num="4">التدقيق النهائي</div>
  </div>

  <!-- الخطوة 1: اختيار نوع المنشأة -->
  <div class="panel" id="step1Panel">
    <label>🏭 نوع المنشأة</label>
    <select id="establishmentType">
      <option value="">-- اختر النوع --</option>
      <option value="محل">محل</option>
      <option value="مستودع">مستودع</option>
      <option value="ورشة">ورشة</option>
      <option value="مصنع">مصنع</option>
      <option value="مبسط">مبسط</option>
      <option value="مكتب">مكتب</option>
      <option value="كشك">كشك</option>
    </select>
    <button class="btn" onclick="goToStep2()">التالي: السجل التجاري ←</button>
  </div>

  <!-- الخطوة 2: السجل التجاري -->
  <div class="panel" id="step2Panel" style="display:none;">
    <label>📋 رقم السجل التجاري</label>
    <div class="inline">
      <input type="text" id="commercialRegNumber" placeholder="أدخل رقم السجل (مثلاً 1010)" style="flex:1;">
      <button class="btn btn-sm" onclick="verifyCommercialReg()">فحص السجل</button>
    </div>
    <div id="crResult" style="margin-top:10px;"></div>
    <div id="crActivityWarning" class="warning-text"></div>
    <button class="btn" id="toStep3Btn" style="display:none;" onclick="goToStep3()">التالي: رفع عقد الإيجار ←</button>
  </div>

  <!-- الخطوة 3: عقد الإيجار -->
  <div class="panel" id="step3Panel" style="display:none;">
    <label>📄 رفع عقد الإيجار (PDF)</label>
    <div class="fake-upload" id="uploadLeaseTrigger">
      <span>📎 اضغط هنا لرفع عقد الإيجار</span>
      <span>⬆️</span>
    </div>
    <input type="file" id="realLeaseFile" accept=".pdf,.jpg,.png" style="display:none;">
    <div style="margin-top:15px;">
      <strong>البيانات المستخرجة تلقائياً:</strong>
      <div class="row" style="margin-top:10px;">
        <input type="text" id="tenantName" placeholder="اسم المستأجر" readonly>
        <input type="text" id="ownerName" placeholder="اسم المالك" readonly>
      </div>
      <div class="row">
        <input type="text" id="area" placeholder="المساحة (م²)" readonly>
        <input type="text" id="openingsCount" placeholder="عدد الفتحات" readonly>
      </div>
      <div class="row">
        <input type="text" id="contractEndDate" placeholder="تاريخ انتهاء العقد (مثال: 2027-05-01)" readonly>
        <input type="text" id="pieceNumber" placeholder="رقم القطعة" readonly>
      </div>
      <div class="row">
        <input type="text" id="planNumber" placeholder="رقم المخطط" readonly>
        <input type="text" id="nationalAddress" placeholder="العنوان الوطني" readonly>
      </div>
    </div>
    <div id="leaseDateWarning" class="warning-text"></div>
    <button class="btn" id="toStep4Btn" style="display:none;" onclick="goToStep4()">التالي: عرض الموقع والتدقيق ←</button>
  </div>

  <!-- الخطوة 4: الخريطة والتدقيق -->
  <div class="panel" id="step4Panel" style="display:none;">
    <label>📍 موقع العقار على الخريطة (تم تحديده من بيانات العقد)</label>
    <div id="map"></div>
    <div class="hint" id="mapHint"></div>
    <button class="btn" id="finalAuditBtn" onclick="runFinalAudit()">🔍 تدقيق نهائي وإصدار الحكم</button>
    <div id="finalResult" style="margin-top:20px;"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // ---------- قواعد البيانات الوهمية ----------
  // 1. قاعدة السجلات التجارية (رقم -> أنشطة مسموحة)
  const crDatabase = {
    "1010": ["محل", "مكتب", "كشك", "مقهى"],  // سجل تجاري يسمح بأنشطة تجارية
    "2020": ["مستودع", "مخازن عامة"],
    "3030": ["ورشة", "مصنع"],
    "4040": ["محل", "مستودع", "ورشة"] // متعدد
  };

  // 2. قاعدة بيانات القطع العقارية (رقم القطعة + المخطط -> إحداثيات و تصنيف المنطقة)
  const landDatabase = {
    "123-456": { lat: 24.7200, lng: 46.6800, zone: "تجاري", address: "شارع التحلية، حي الروضة" },
    "88-999":  { lat: 24.7050, lng: 46.6600, zone: "صناعي", address: "المنطقة الصناعية، طريق الخرج" },
    "55-111":  { lat: 24.6900, lng: 46.7200, zone: "مستودعات", address: "حي المستودعات، الدائري الجنوبي" },
    "10-202":  { lat: 24.7350, lng: 46.6900, zone: "تجاري", address: "طريق الملك فهد، العليا" }
  };

  // 3. محاكاة استخراج بيانات عقد إيجار (حسب القطعة)
  const leaseMockData = {
    "123-456": { tenant: "مؤسسة النخبة التجارية", owner: "عبدالله العتيبي", area: 120, openings: 3, endDate: "2027-05-01", piece: "123", plan: "456", address: "شارع التحلية، حي الروضة" },
    "88-999":  { tenant: "شركة التصنيع المتقدمة", owner: "محمد القحطاني", area: 450, openings: 5, endDate: "2025-12-30", piece: "88", plan: "999", address: "المنطقة الصناعية، طريق الخرج" },
    "55-111": { tenant: "مستودعات الجزيرة", owner: "سعد السبيعي", area: 800, openings: 2, endDate: "2026-08-15", piece: "55", plan: "111", address: "حي المستودعات، الدائري الجنوبي" },
    "10-202": { tenant: "كافيه لينا", owner: "لينا أحمد", area: 60, openings: 1, endDate: "2025-01-10", piece: "10", plan: "202", address: "طريق الملك فهد، العليا" }
  };

  // متغيرات عامة
  let currentStep = 1;
  let selectedType = "";
  let crValidated = false;
  let leaseData = null;
  let mapInitialized = false;
  let map, selectedMarker;

  // تحديث مؤشر الخطوات
  function updateStepsUI(step) {
    document.querySelectorAll('.step').forEach((el, idx) => {
      el.classList.remove('active', 'done');
      if (idx + 1 === step) el.classList.add('active');
      else if (idx + 1 < step) el.classList.add('done');
    });
  }

  // الانتقال للخطوة 2
  function goToStep2() {
    selectedType = document.getElementById('establishmentType').value;
    if (!selectedType) { alert("الرجاء اختيار نوع المنشأة"); return; }
    document.getElementById('step1Panel').style.display = 'none';
    document.getElementById('step2Panel').style.display = 'block';
    currentStep = 2;
    updateStepsUI(2);
  }

  // التحقق من السجل التجاري
  function verifyCommercialReg() {
    const regNumber = document.getElementById('commercialRegNumber').value.trim();
    const resultDiv = document.getElementById('crResult');
    const warningDiv = document.getElementById('crActivityWarning');
    const nextBtn = document.getElementById('toStep3Btn');

    if (!regNumber || !crDatabase[regNumber]) {
      resultDiv.innerHTML = '<span class="warning-text">❌ رقم السجل غير موجود في قاعدة البيانات (محاكاة)</span>';
      nextBtn.style.display = 'none';
      crValidated = false;
      return;
    }

    const allowedActivities = crDatabase[regNumber];
    // هل النشاط المختار موجود في السجل؟
    if (allowedActivities.includes(selectedType)) {
      resultDiv.innerHTML = '<span style="color:#065f46; font-weight:bold;">✅ السجل التجاري ساري والنشاط مطابق.</span>';
      warningDiv.innerHTML = '';
      nextBtn.style.display = 'inline-block';
      crValidated = true;
    } else {
      resultDiv.innerHTML = '<span style="color:#b91c1c;">⚠️ السجل التجاري موجود لكن النشاط المختار غير مضاف.</span>';
      warningDiv.innerHTML = '🚫 يجب إضافة نشاط "' + selectedType + '" إلى السجل التجاري قبل المتابعة.';
      nextBtn.style.display = 'none';
      crValidated = false;
    }
  }

  // الانتقال للخطوة 3
  function goToStep3() {
    if (!crValidated) { alert("يجب التحقق من السجل التجاري أولاً"); return; }
    document.getElementById('step2Panel').style.display = 'none';
    document.getElementById('step3Panel').style.display = 'block';
    currentStep = 3;
    updateStepsUI(3);
  }

  // محاكاة رفع العقد واستخراج البيانات
  function mockUploadLease() {
    // نعطي المستخدم خيارًا: نأخذ رقم القطعة والمخطط من قاعدة بياناتنا بشكل عشوائي للعرض.
    // لكن في الواقع سنضغط على الزر ونقوم بملء الحقول ببيانات وهمية افتراضية (مثلاً قطعة 123-456)
    // لنجعل التجربة تفاعلية: نعرض رسالة ثم نعبئ بيانات أحد العقود.
    const piecePlanOptions = Object.keys(leaseMockData);
    const randomKey = piecePlanOptions[Math.floor(Math.random() * piecePlanOptions.length)];
    const data = leaseMockData[randomKey];

    document.getElementById('tenantName').value = data.tenant;
    document.getElementById('ownerName').value = data.owner;
    document.getElementById('area').value = data.area;
    document.getElementById('openingsCount').value = data.openings;
    document.getElementById('contractEndDate').value = data.endDate;
    document.getElementById('pieceNumber').value = data.piece;
    document.getElementById('planNumber').value = data.plan;
    document.getElementById('nationalAddress').value = data.address;

    // تخزين البيانات
    leaseData = data;

    // التحقق من تاريخ العقد
    const endDate = new Date(data.endDate);
    const today = new Date();
    const warningDiv = document.getElementById('leaseDateWarning');
    const nextBtn = document.getElementById('toStep4Btn');

    if (endDate < today) {
      warningDiv.innerHTML = '⛔ عقد الإيجار منتهي الصلاحية! لا يمكن إكمال الطلب.';
      nextBtn.style.display = 'none';
    } else {
      warningDiv.innerHTML = '';
      nextBtn.style.display = 'inline-block';
    }
  }

  // ربط الزر المزيف برفع الملف والمحاكاة
  document.getElementById('uploadLeaseTrigger').addEventListener('click', function() {
    // في الإصدار الحقيقي هنا نفتح نافذة رفع الملف، لكننا نكتفي بالمحاكاة
    mockUploadLease();
    alert("✅ تم تحليل عقد الإيجار بنجاح (محاكاة).");
  });
  document.getElementById('realLeaseFile').addEventListener('change', function(e) {
    mockUploadLease();
    alert("📄 تم فحص الملف (محاكاة OCR).");
  });

  // الانتقال للخطوة 4: الخريطة
  function goToStep4() {
    if (!leaseData) { alert("يجب رفع العقد أولاً"); return; }
    document.getElementById('step3Panel').style.display = 'none';
    document.getElementById('step4Panel').style.display = 'block';
    currentStep = 4;
    updateStepsUI(4);

    // تهيئة الخريطة (مرة واحدة)
    if (!mapInitialized) {
      initMap();
      mapInitialized = true;
    }

    // تحديد الموقع بناءً على رقم القطعة والمخطط
    const piece = leaseData.piece;
    const plan = leaseData.plan;
    const key = piece + "-" + plan;
    const landInfo = landDatabase[key];

    if (landInfo && map) {
      if (selectedMarker) map.removeLayer(selectedMarker);
      const latlng = [landInfo.lat, landInfo.lng];
      map.setView(latlng, 15);
      selectedMarker = L.marker(latlng).addTo(map)
        .bindPopup(`<b>${landInfo.address}</b><br>قطعة ${piece} - مخطط ${plan}<br>منطقة: ${landInfo.zone}`).openPopup();
      document.getElementById('mapHint').innerHTML = `📍 الموقع: ${landInfo.address} (${landInfo.zone})`;
      // تخزين المنطقة لاستخدامها في التدقيق
      window.currentZone = landInfo.zone;
    } else {
      document.getElementById('mapHint').innerHTML = '⚠️ لم يتم العثور على إحداثيات للقطعة والمخطط في قاعدة البيانات. استخدم الخريطة يدوياً.';
      window.currentZone = "غير معروف";
    }
  }

  function initMap() {
    map = L.map('map').setView([24.7136, 46.6753], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // إضافة مناطق مرجعية (دوائر ملونة)
    L.circle([24.7200, 46.6800], { color: '#2a9d8f', fillColor: '#2a9d8f', fillOpacity: 0.15, radius: 900 }).addTo(map).bindPopup('منطقة تجارية');
    L.circle([24.7050, 46.6600], { color: '#e76f51', fillColor: '#e76f51', fillOpacity: 0.15, radius: 900 }).addTo(map).bindPopup('منطقة صناعية');
    L.circle([24.6900, 46.7200], { color: '#e9c46a', fillColor: '#e9c46a', fillOpacity: 0.15, radius: 900 }).addTo(map).bindPopup('منطقة مستودعات');
  }

  // التدقيق النهائي
  function runFinalAudit() {
    if (!window.currentZone || window.currentZone === "غير معروف") {
      document.getElementById('finalResult').innerHTML = `
        <div class="result-box reject">🔴 لا يمكن التدقيق: موقع العقار غير محدد بدقة.</div>`;
      return;
    }

    // قواعد المناطق حسب النشاط (مبسطة)
    const zoneCompatibility = {
      "تجاري": ["محل", "مكتب", "كشك", "مقهى"],
      "صناعي": ["ورشة", "مصنع"],
      "مستودعات": ["مستودع"]
    };

    const zone = window.currentZone;
    const allowed = zoneCompatibility[zone] || [];
    const isAllowed = allowed.includes(selectedType);

    const resultDiv = document.getElementById('finalResult');
    if (isAllowed) {
      resultDiv.innerHTML = `
        <div class="result-box success">
          ✅ النشاط متوافق مع الموقع<br>
          <small>نوع المنشأة "${selectedType}" مسموح في المنطقة ${zone}. يمكن تقديم الطلب.</small>
        </div>`;
    } else {
      const suggestion = allowed.length ? "الأنشطة المسموحة: " + allowed.join("، ") : "لا توجد أنشطة متوافقة.";
      resultDiv.innerHTML = `
        <div class="result-box reject">
          🚫 النشاط غير مسموح في هذه المنطقة<br>
          <small>لا يمكن إقامة "${selectedType}" في منطقة ${zone}. ${suggestion}</small>
        </div>`;
    }
  }
</script>
</body>
</html>
