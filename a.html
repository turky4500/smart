<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أمانة منطقة الرياض - استعراض الشركات المعتمدة</title>
    
    <script data-goatcounter="https://tur100.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcfcfc;
            color: #333333;
            direction: rtl;
        }
        .page-container {
            max-width: 850px;
            margin: 30px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        /* الهوية البصرية لأمانة منطقة الرياض */
        .header {
            border-bottom: 3px solid #005A36; /* الأخضر البلدي الرسمي */
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-text-right h1 {
            font-size: 22px;
            margin: 0;
            color: #005A36;
            font-weight: bold;
        }
        .logo-text-right p {
            font-size: 14px;
            margin: 5px 0 0 0;
            color: #666666;
        }
        .logo-graphic-left {
            border-right: 4px solid #D4AF37; /* لمسة ذهبية */
            padding-right: 15px;
            text-align: left;
        }
        .emblem-title {
            font-size: 14px;
            font-weight: bold;
            color: #005A36;
            margin: 0;
        }
        .emblem-subtitle {
            font-size: 11px;
            color: #888888;
            margin-top: 2px;
        }
        .content {
            text-align: center;
            margin-bottom: 40px;
        }
        .document-title {
            font-size: 18px;
            color: #222222;
            margin-bottom: 25px;
            font-weight: bold;
            text-align: right;
            border-right: 4px solid #005A36;
            padding-right: 10px;
        }
        .image-container {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            display: inline-block;
            max-width: 100%;
        }
        .embedded-image {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }
        .footer {
            margin-top: 50px;
            border-top: 1px solid #eeeeee;
            padding-top: 15px;
            text-align: center;
            font-size: 12px;
            color: #777777;
        }
    </style>
</head>
<body>

    <div class="page-container">
        
        <div class="header">
            <div class="logo-text-right">
                <h1>أمانة منطقة الرياض</h1>
                <p>الإدارة العامة لتقنية المعلومات والخدمات الرقمية</p>
            </div>
            <div class="logo-graphic-left">
                <div class="emblem-title">RIYADH MUNICIPALITY</div>
                <div class="emblem-subtitle">المملكة العربية السعودية</div>
            </div>
        </div>

        <div class="content">
            <div class="document-title">وثيقة الشركات المعتمدة (نسخة العرض الرقمي)</div>
            
            <div class="image-container">
                <img src="https://1drv.ms/i/c/54a454af034e2962/IQS4iGefftBqS4rCUz8lu7KhAWYC3UlBcKIKz_oeYy95c1M?width=660" 
                     alt="الشركات المعتمدة" 
                     width="660" 
                     class="embedded-image" />
            </div>
        </div>

        <div class="footer">
            <p>© أمانة منطقة الرياض 1447هـ - 2026م</p>
        </div>

    </div>

</body>
</html>
