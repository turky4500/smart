<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صانع الشهادات - Certificate Maker</title>

    <!-- Google Fonts: Arabic fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@300;400;600;700;900&family=El+Messiri:wght@400;500;600;700&family=Lateef:wght@300;400;500;600;700&family=Reem+Kufi:wght@400;500;600;700&family=Scheherazade+New:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <!-- Firebase SDKs (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #f0f2f5;
            --panel-bg: #ffffff;
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --accent: #c5960c;
            --accent-light: #f0d060;
            --text: #1f1f1f;
            --text-light: #5f6368;
            --border: #e0e0e0;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: #e8ecf1;
            color: var(--text);
            min-height: 100vh;
            direction: rtl;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a3a4a 0%, #1a2d3a 40%, #1a1a2e 100%);
            color: #fff;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header .logo-icon {
            font-size: 36px;
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .header .badge {
            background: var(--accent);
            color: #1a1a2e;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .btn-logout {
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            font-family: inherit;
        }
        .btn-logout:hover {
            background: rgba(255,255,255,0.3);
        }
        .user-info-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.9rem;
        }

        /* Main Layout */
        .main-container {
            display: flex;
            gap: 20px;
            padding: 20px 24px;
            max-width: 1500px;
            margin: 0 auto;
            align-items: flex-start;
        }

        .card {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 20px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
            font-family: inherit;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        .btn-accent {
            background: var(--accent);
            color: #1a1a2e;
        }
        .btn-accent:hover {
            background: #e0a800;
        }
        .btn-secondary {
            background: #eee;
            color: #333;
        }

        .hidden {
            display: none !important;
        }

        canvas {
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin: 12px 0;
        }

        input, textarea, select {
            padding: 10px;
            border: 1px solid #d5d9e0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            margin: 5px 0;
            width: 100%;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
        }
        .admin-table th, .admin-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        .admin-table th {
            background: #f0f2f5;
        }

        .request-card {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        .request-card img {
            max-width: 150px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="logo-area">
            <span class="logo-icon">🎓</span>
            <h1>صانع الشهادات</h1>
            <span class="badge">Certificate Maker</span>
        </div>
        <div class="user-info-bar" id="userInfoBar"></div>
    </header>

    <!-- Main Container -->
    <div class="main-container" id="appContainer">
        <!-- المحتوى سيتم ملؤه ديناميكيًا حسب حالة الدخول والدور -->
    </div>

    <script>
        // ==================== إعدادات Firebase ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBSGKRBNWZ1OeUFTxMlBBsfE0whNSJTzRA",
            authDomain: "shahadat-4f10e.firebaseapp.com",
            projectId: "shahadat-4f10e",
            storageBucket: "shahadat-4f10e.firebasestorage.app",
            messagingSenderId: "644757743305",
            appId: "1:644757743305:web:ecde7ff86595a934714f18",
            measurementId: "G-XTMF6NH7JW"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==================== المتغيرات العامة ====================
        let currentUser = null;
        let userRole = 'user'; // 'user' or 'admin'
        let userBalance = 0;
        let freeCertificatesDefault = 2; // يتم تحميله من الإعدادات
        let bankAccountNumber = ''; // من الإعدادات
        let packages = []; // أسعار الباقات
        let certificateState = {
            mainName: 'أحمد محمد عبدالله',
            mainNameColor: '#1a3a4a',
            mainNameSize: 46,
            appreciationText: 'نشكرك على جهودك المتميزة وتفانيك في العمل، متمنين لك مزيداً من التوفيق والنجاح.',
            appreciationColor: '#3d5a40',
            appreciationSize: 22,
            globalFont: 'Amiri',
            borderStyle: 0,
            backgroundColor: '#fefefb'
        };

        // ==================== دوال المساعدة ====================
        function showElement(id) { document.getElementById(id)?.classList.remove('hidden'); }
        function hideElement(id) { document.getElementById(id)?.classList.add('hidden'); }

        // ==================== مراقب حالة الدخول ====================
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                // جلب بيانات المستخدم من Firestore
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (userDoc.exists) {
                    const data = userDoc.data();
                    userRole = data.role || 'user';
                    userBalance = data.balance || 0;
                } else {
                    // مستخدم جديد: إنشاء وثيقة مع الرصيد المجاني الافتراضي
                    const settingsSnap = await db.collection('settings').doc('general').get();
                    if (settingsSnap.exists) {
                        freeCertificatesDefault = settingsSnap.data().freeCertificates || 2;
                    }
                    await db.collection('users').doc(user.uid).set({
                        email: user.email,
                        role: 'user',
                        balance: freeCertificatesDefault
                    });
                    userRole = 'user';
                    userBalance = freeCertificatesDefault;
                }

                // تحميل الإعدادات العامة
                await loadSettings();

                // تحديث شريط المعلومات العلوي
                updateUserInfoBar();

                // عرض الواجهة المناسبة
                if (userRole === 'admin') {
                    renderAdminPanel();
                } else {
                    renderUserPanel();
                }
            } else {
                // لا يوجد مستخدم مسجل
                currentUser = null;
                userRole = 'user';
                userBalance = 0;
                updateUserInfoBar();
                renderAuthForm();
            }
        });

        // تحميل الإعدادات من Firestore
        async function loadSettings() {
            const doc = await db.collection('settings').doc('general').get();
            if (doc.exists) {
                const data = doc.data();
                freeCertificatesDefault = data.freeCertificates || 2;
                bankAccountNumber = data.bankAccount || '';
                packages = data.packages || [
                    { count: 10, price: 50 },
                    { count: 50, price: 200 },
                    { count: 100, price: 350 }
                ];
            } else {
                // إعدادات افتراضية
                freeCertificatesDefault = 2;
                bankAccountNumber = '';
                packages = [
                    { count: 10, price: 50 },
                    { count: 50, price: 200 },
                    { count: 100, price: 350 }
                ];
            }
        }

        function updateUserInfoBar() {
            const bar = document.getElementById('userInfoBar');
            if (currentUser) {
                bar.innerHTML = `
                    <span>${currentUser.email} (${userRole === 'admin' ? 'أدمن' : 'مستخدم'})</span>
                    <span>الرصيد: ${userBalance} شهادة</span>
                    <button class="btn-logout" onclick="logout()">تسجيل خروج</button>
                `;
            } else {
                bar.innerHTML = '';
            }
        }

        function logout() {
            auth.signOut();
        }

        // ==================== واجهة تسجيل الدخول / إنشاء حساب ====================
        function renderAuthForm() {
            document.getElementById('appContainer').innerHTML = `
                <div class="card" style="max-width:500px; margin:40px auto;">
                    <h2>تسجيل الدخول أو إنشاء حساب</h2>
                    <input type="email" id="email" placeholder="البريد الإلكتروني">
                    <input type="password" id="password" placeholder="كلمة المرور">
                    <div style="display:flex; gap:12px; margin-top:12px;">
                        <button class="btn btn-primary" onclick="login()">دخول</button>
                        <button class="btn btn-accent" onclick="register()">إنشاء حساب جديد</button>
                    </div>
                </div>
            `;
        }

        function login() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(email, pass)
                .catch(err => alert('خطأ: ' + err.message));
        }

        function register() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            auth.createUserWithEmailAndPassword(email, pass)
                .catch(err => alert('خطأ: ' + err.message));
        }

        // ==================== لوحة المستخدم ====================
        function renderUserPanel() {
            document.getElementById('appContainer').innerHTML = `
                <div style="flex:1;">
                    <div class="card">
                        <h3>صانع الشهادات</h3>
                        <p>رصيدك المتبقي: <strong>${userBalance}</strong> شهادة</p>
                        <canvas id="certCanvas" width="1100" height="750"></canvas>
                        <div style="display:flex; gap:12px; margin-top:12px;">
                            <button class="btn btn-accent" onclick="downloadCertificate()">📥 تحميل الشهادة</button>
                            <button class="btn btn-primary" onclick="renderRequestForm()">طلب شهادات إضافية</button>
                        </div>
                    </div>
                </div>
                <div style="flex:0 0 300px;">
                    <div class="card">
                        <h4>تخصيص سريع</h4>
                        <label>الاسم:</label>
                        <input type="text" id="quickName" value="${certificateState.mainName}" oninput="certificateState.mainName=this.value; drawCertificate()">
                        <label>نوع الخط:</label>
                        <select id="quickFont" onchange="certificateState.globalFont=this.value; drawCertificate()">
                            <option value="Cairo">القاهرة</option>
                            <option value="Amiri" selected>أميري</option>
                            <option value="El Messiri">المسيري</option>
                            <option value="Reem Kufi">ريم كوفي</option>
                            <option value="Aref Ruqaa">عارف رقعة</option>
                            <option value="Lateef">لطيف</option>
                            <option value="Scheherazade New">شهرزاد</option>
                            <option value="Tajawal">تاجوال</option>
                        </select>
                    </div>
                </div>
            `;
            drawCertificate();
        }

        // رسم الشهادة (نسخة مبسطة، يمكنك لاحقًا دمج الكود الكامل للصانع)
        function drawCertificate() {
            const canvas = document.getElementById('certCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;

            // خلفية
            ctx.fillStyle = certificateState.backgroundColor;
            ctx.fillRect(0, 0, w, h);

            // إطار بسيط
            ctx.strokeStyle = '#c5960c';
            ctx.lineWidth = 8;
            ctx.strokeRect(20, 20, w-40, h-40);

            // العنوان
            ctx.font = `bold 48px "${certificateState.globalFont}", serif`;
            ctx.fillStyle = '#8b6914';
            ctx.textAlign = 'center';
            ctx.fillText('شهادة تقدير', w/2, 120);

            // الاسم
            ctx.font = `bold ${certificateState.mainNameSize}px "${certificateState.globalFont}", serif`;
            ctx.fillStyle = certificateState.mainNameColor;
            ctx.fillText(certificateState.mainName, w/2, 280);

            // نص الشكر
            ctx.font = `${certificateState.appreciationSize}px "${certificateState.globalFont}", serif`;
            ctx.fillStyle = certificateState.appreciationColor;
            ctx.fillText(certificateState.appreciationText, w/2, 400);

            // توقيعات وهمية
            ctx.font = `18px "${certificateState.globalFont}", serif`;
            ctx.fillStyle = '#555';
            ctx.fillText('مدير المؤسسة', w*0.75, h-120);
            ctx.fillText('رئيس القسم', w*0.25, h-120);
        }

        async function downloadCertificate() {
            if (!currentUser) return alert('يجب تسجيل الدخول');
            if (userBalance <= 0) {
                alert('نفد رصيدك. يرجى طلب شهادات إضافية.');
                return;
            }
            // خصم شهادة من الرصيد
            await db.collection('users').doc(currentUser.uid).update({
                balance: firebase.firestore.FieldValue.increment(-1)
            });
            userBalance--;
            updateUserInfoBar();
            document.querySelector('#appContainer p strong').textContent = userBalance;

            // تنزيل الشهادة
            const canvas = document.getElementById('certCanvas');
            const link = document.createElement('a');
            link.download = 'شهادة.png';
            link.href = canvas.toDataURL();
            link.click();
            alert('تم تحميل الشهادة بنجاح');
        }

        // ==================== طلب شهادات إضافية ====================
        function renderRequestForm() {
            document.getElementById('appContainer').innerHTML = `
                <div class="card" style="max-width:600px; margin:40px auto;">
                    <h3>طلب شهادات إضافية</h3>
                    <p>رقم الحساب للتحويل: <strong>${bankAccountNumber || 'لم يحدد بعد'}</strong></p>
                    <label>اختر الباقة:</label>
                    <select id="packageSelect" onchange="updatePriceDisplay()">
                        ${packages.map((p,i) => `<option value="${i}">${p.count} شهادة - ${p.price} ريال</option>`).join('')}
                    </select>
                    <p>المبلغ المطلوب: <strong id="totalPrice">${packages[0]?.price || 0}</strong> ريال</p>
                    <label>ارفع صورة إيصال الدفع:</label>
                    <input type="file" id="receiptFile" accept="image/*">
                    <br><br>
                    <button class="btn btn-accent" onclick="submitRequest()">تقديم الطلب</button>
                    <button class="btn btn-secondary" onclick="renderUserPanel()">رجوع</button>
                </div>
            `;
        }

        function updatePriceDisplay() {
            const idx = document.getElementById('packageSelect').value;
            document.getElementById('totalPrice').textContent = packages[idx].price;
        }

        async function submitRequest() {
            const fileInput = document.getElementById('receiptFile');
            const file = fileInput.files[0];
            if (!file) return alert('الرجاء رفع صورة الإيصال');

            // تحويل الصورة إلى base64
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64Image = e.target.result;
                const idx = document.getElementById('packageSelect').value;
                const pkg = packages[idx];

                // إضافة الطلب إلى Firestore
                await db.collection('requests').add({
                    userId: currentUser.uid,
                    email: currentUser.email,
                    packageCount: pkg.count,
                    price: pkg.price,
                    imageBase64: base64Image,
                    status: 'pending',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert('تم تقديم الطلب بنجاح، سنقوم بمراجعته وإضافة الرصيد.');
                renderUserPanel();
            };
            reader.readAsDataURL(file);
        }

        // ==================== لوحة الأدمن ====================
        function renderAdminPanel() {
            document.getElementById('appContainer').innerHTML = `
                <div style="flex:1;">
                    <div class="card">
                        <h3>لوحة تحكم الأدمن</h3>
                        <button class="btn btn-primary" onclick="manageUsers()">👥 إدارة المستخدمين</button>
                        <button class="btn btn-primary" onclick="manageRequests()">📩 الطلبات الواردة</button>
                        <button class="btn btn-primary" onclick="manageSettings()">⚙️ الإعدادات العامة</button>
                    </div>
                    <div id="adminContent"></div>
                </div>
            `;
        }

        async function manageUsers() {
            const snapshot = await db.collection('users').get();
            let html = `<h4>قائمة المستخدمين</h4>
                <table class="admin-table">
                <tr><th>البريد</th><th>الرصيد</th><th>الدور</th><th>إضافة رصيد</th></tr>`;
            snapshot.forEach(doc => {
                const data = doc.data();
                html += `<tr>
                    <td>${data.email}</td>
                    <td>${data.balance}</td>
                    <td>${data.role || 'user'}</td>
                    <td>
                        <input type="number" id="bal_${doc.id}" placeholder="عدد" style="width:80px;">
                        <button class="btn btn-secondary" onclick="addBalance('${doc.id}')">إضافة</button>
                    </td>
                </tr>`;
            });
            html += '</table>';
            document.getElementById('adminContent').innerHTML = html;
        }

        async function addBalance(userId) {
            const amount = parseInt(document.getElementById('bal_'+userId).value);
            if (isNaN(amount) || amount <= 0) return alert('أدخل رقماً صحيحاً');
            await db.collection('users').doc(userId).update({
                balance: firebase.firestore.FieldValue.increment(amount)
            });
            alert('تمت الإضافة');
            manageUsers(); // تحديث
        }

        async function manageRequests() {
            const snapshot = await db.collection('requests').where('status','==','pending').get();
            let html = '<h4>الطلبات المعلقة</h4>';
            if (snapshot.empty) {
                html += '<p>لا توجد طلبات معلقة حالياً.</p>';
            } else {
                snapshot.forEach(doc => {
                    const data = doc.data();
                    html += `
                    <div class="request-card">
                        <img src="${data.imageBase64}" alt="إيصال">
                        <div>
                            <p><strong>البريد:</strong> ${data.email}</p>
                            <p><strong>الباقة:</strong> ${data.packageCount} شهادة - ${data.price} ريال</p>
                            <button class="btn btn-accent" onclick="approveRequest('${doc.id}', ${data.packageCount}, '${data.userId}')">موافقة</button>
                            <button class="btn btn-secondary" onclick="rejectRequest('${doc.id}')">رفض</button>
                        </div>
                    </div>`;
                });
            }
            document.getElementById('adminContent').innerHTML = html;
        }

        async function approveRequest(reqId, count, userId) {
            await db.collection('requests').doc(reqId).update({ status: 'approved' });
            await db.collection('users').doc(userId).update({
                balance: firebase.firestore.FieldValue.increment(count)
            });
            alert('تمت الموافقة وإضافة الرصيد للمستخدم');
            manageRequests();
        }

        async function rejectRequest(reqId) {
            await db.collection('requests').doc(reqId).update({ status: 'rejected' });
            alert('تم رفض الطلب');
            manageRequests();
        }

        async function manageSettings() {
            const doc = await db.collection('settings').doc('general').get();
            const data = doc.exists ? doc.data() : {};
            const free = data.freeCertificates || 2;
            const bank = data.bankAccount || '';
            document.getElementById('adminContent').innerHTML = `
                <h4>الإعدادات العامة</h4>
                <label>عدد الشهادات المجانية للمستخدم الجديد:</label>
                <input type="number" id="freeCount" value="${free}">
                <label>رقم الحساب البنكي:</label>
                <input type="text" id="bankAccount" value="${bank}">
                <button class="btn btn-primary" onclick="saveSettings()">حفظ الإعدادات</button>
            `;
        }

        async function saveSettings() {
            const free = parseInt(document.getElementById('freeCount').value);
            const bank = document.getElementById('bankAccount').value;
            await db.collection('settings').doc('general').set({
                freeCertificates: free,
                bankAccount: bank,
                packages: packages
            }, { merge: true });
            alert('تم حفظ الإعدادات');
            loadSettings(); // إعادة تحميل
        }
    </script>
</body>
</html>
