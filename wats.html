<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إرسال رسائل واتساب</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap');
    
    * {
        font-family: 'Cairo', sans-serif;
    }
    
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
    }
    
    .glass {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    .input-focus:focus {
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        border-color: #667eea;
    }
    
    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .alert-animate {
        animation: slideIn 0.3s ease-out;
    }
    
    .btn-loading {
        position: relative;
        color: transparent !important;
    }
    
    .btn-loading::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        top: 50%;
        left: 50%;
        margin-left: -10px;
        margin-top: -10px;
        border: 3px solid #ffffff;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    
    textarea {
        resize: vertical;
        min-height: 120px;
    }
</style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-2xl">
        <div class="glass rounded-2xl shadow-2xl p-8 md:p-10">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-purple-500 to-indigo-600 mb-4 shadow-lg">
                    <i class="fa-brands fa-whatsapp text-white text-3xl"></i>
                </div>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">إرسال رسائل واتساب</h1>
                <p class="text-gray-600 text-sm">أرسل رسالتك لعدة أرقام بضغطة واحدة</p>
            </div>

            <!-- Alert Container -->
            <div id="alertContainer" class="mb-6 hidden"></div>

            <!-- Form -->
            <form id="messageForm" class="space-y-6">
                <!-- Phone Numbers Input -->
                <div>
                    <label for="phoneNumbers" class="block text-gray-700 font-semibold mb-2 text-sm">
                        <i class="fa-solid fa-phone ml-2 text-indigo-600"></i>
                        ادخل رقم الجوال
                    </label>
                    <div class="relative">
                        <input 
                            type="text" 
                            id="phoneNumbers" 
                            class="input-focus w-full px-4 py-3 border-2 border-gray-200 rounded-xl outline-none transition-all text-right"
                            placeholder="9665xxxxxxxx, 9665xxxxxxxx"
                            dir="ltr">
                        <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                            <i class="fa-solid fa-hashtag"></i>
                        </div>
                    </div>
                    <p class="text-xs text-gray-500 mt-2 mr-1">
                        <i class="fa-solid fa-circle-info ml-1"></i>
                        يمكنك إدخال عدة أرقام مفصولة بفاصلة. مثال: 9665xxxxxxxx
                    </p>
                </div>

                <!-- Message Body Textarea -->
                <div>
                    <label for="messageBody" class="block text-gray-700 font-semibold mb-2 text-sm">
                        <i class="fa-solid fa-message ml-2 text-indigo-600"></i>
                        ادخل نص الرسالة
                    </label>
                    <textarea 
                        id="messageBody" 
                        class="input-focus w-full px-4 py-3 border-2 border-gray-200 rounded-xl outline-none transition-all text-right"
                        placeholder="اكتب رسالتك هنا..."
                        rows="5"></textarea>
                    <div class="flex justify-between items-center mt-2 mr-1">
                        <p class="text-xs text-gray-500">
                            <i class="fa-solid fa-text-width ml-1"></i>
                            <span id="charCount">0</span> حرف
                        </p>
                    </div>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit" 
                    id="sendBtn"
                    class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white font-bold py-4 px-6 rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98]">
                    <i class="fa-solid fa-paper-plane ml-2"></i>
                    <span id="btnText">ارسال</span>
                </button>
            </form>

            <!-- Footer Info -->
            <div class="mt-8 pt-6 border-t border-gray-200">
                <div class="flex items-center justify-center gap-4 text-xs text-gray-500">
                    <div class="flex items-center gap-1">
                        <i class="fa-solid fa-shield-halved text-green-600"></i>
                        <span>اتصال آمن</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <i class="fa-solid fa-bolt text-yellow-500"></i>
                        <span>إرسال فوري</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('messageForm');
        const phoneInput = document.getElementById('phoneNumbers');
        const messageInput = document.getElementById('messageBody');
        const sendBtn = document.getElementById('sendBtn');
        const btnText = document.getElementById('btnText');
        const alertContainer = document.getElementById('alertContainer');
        const charCount = document.getElementById('charCount');

        // Character counter
        messageInput.addEventListener('input', () => {
            charCount.textContent = messageInput.value.length;
        });

        // Show alert function
        function showAlert(message, type = 'success') {
            const alertTypes = {
                success: {
                    bg: 'bg-green-50',
                    border: 'border-green-500',
                    text: 'text-green-800',
                    icon: 'fa-circle-check'
                },
                error: {
                    bg: 'bg-red-50',
                    border: 'border-red-500',
                    text: 'text-red-800',
                    icon: 'fa-circle-xmark'
                },
                warning: {
                    bg: 'bg-yellow-50',
                    border: 'border-yellow-500',
                    text: 'text-yellow-800',
                    icon: 'fa-triangle-exclamation'
                }
            };

            const config = alertTypes[type];
            
            alertContainer.innerHTML = `
                <div class="${config.bg} ${config.border} ${config.text} border-r-4 p-4 rounded-lg alert-animate">
                    <div class="flex items-start gap-3">
                        <i class="fa-solid ${config.icon} text-xl mt-0.5"></i>
                        <div class="flex-1">
                            <p class="font-semibold">${message}</p>
                        </div>
                        <button onclick="this.parentElement.parentElement.parentElement.classList.add('hidden')" class="text-gray-500 hover:text-gray-700">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                </div>
            `;
            alertContainer.classList.remove('hidden');
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                alertContainer.classList.add('hidden');
            }, 5000);
        }

        // Validate phone number format
        function validatePhoneNumber(number) {
            // Remove all spaces and special chars except +
            const cleaned = number.trim().replace(/[\s\-\(\)]/g, '');
            // Basic validation: should start with 966 or +966 and have 12-13 digits total
            const phoneRegex = /^(\+?966)?5[0-9]{8}$/;
            return phoneRegex.test(cleaned);
        }

        // Parse and validate phone numbers
        function parsePhoneNumbers(input) {
            if (!input.trim()) {
                return { valid: false, error: 'الرجاء إدخال رقم جوال واحد على الأقل' };
            }

            const numbers = input.split(',').map(n => n.trim()).filter(n => n);
            const invalidNumbers = [];
            const validNumbers = [];

            numbers.forEach(num => {
                if (validatePhoneNumber(num)) {
                    // Normalize to format without +
                    let cleaned = num.trim().replace(/[\s\-\(\)]/g, '');
                    if (!cleaned.startsWith('966')) {
                        cleaned = '966' + cleaned.replace(/^\+?966/, '');
                    }
                    validNumbers.push(cleaned);
                } else {
                    invalidNumbers.push(num);
                }
            });

            if (invalidNumbers.length > 0) {
                return { 
                    valid: false, 
                    error: `أرقام غير صحيحة: ${invalidNumbers.join(', ')}. الصيغة الصحيحة: 9665xxxxxxxx` 
                };
            }

            return { valid: true, numbers: validNumbers };
        }

        // Form submit handler
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Hide previous alerts
            alertContainer.classList.add('hidden');

            // Validate message
            const message = messageInput.value.trim();
            if (!message) {
                showAlert('الرجاء إدخال نص الرسالة', 'warning');
                messageInput.focus();
                return;
            }

            if (message.length < 1) {
                showAlert('نص الرسالة قصير جداً', 'warning');
                return;
            }

            // Validate phone numbers
            const phoneValidation = parsePhoneNumbers(phoneInput.value);
            if (!phoneValidation.valid) {
                showAlert(phoneValidation.error, 'error');
                phoneInput.focus();
                return;
            }

            // Disable button and show loading
            sendBtn.disabled = true;
            sendBtn.classList.add('btn-loading');

            try {
                const response = await fetch('http://wats-enzn.onrender.com/api/send-message', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer sau11zbtz1ruma8o2k5tt',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        to: phoneValidation.numbers,
                        body: message
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(`تم إرسال الرسالة بنجاح إلى ${phoneValidation.numbers.length} رقم`, 'success');
                    // Clear form
                    form.reset();
                    charCount.textContent = '0';
                } else {
                    const errorMsg = data.message || data.error || 'حدث خطأ أثناء الإرسال';
                    showAlert(`فشل الإرسال: ${errorMsg}`, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('تعذر الاتصال بالخادم. الرجاء المحاولة لاحقاً', 'error');
            } finally {
                // Re-enable button
                sendBtn.disabled = false;
                sendBtn.classList.remove('btn-loading');
            }
        });

        // Auto-format phone numbers on blur
        phoneInput.addEventListener('blur', () => {
            const value = phoneInput.value;
            if (value) {
                const numbers = value.split(',').map(n => {
                    let cleaned = n.trim().replace(/[\s\-\(\)]/g, '');
                    // Add 966 prefix if not present
                    if (cleaned && !cleaned.startsWith('966') && !cleaned.startsWith('+966')) {
                        cleaned = '966' + cleaned.replace(/^0/, '');
                    }
                    return cleaned;
                });
                phoneInput.value = numbers.join(', ');
            }
        });
    </script>
</body>
</html>
