<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إرسال رسائل واتساب متعددة الوسائط</title>
    <style>
        :root {
            --primary-color: #075e54;
            --secondary-color: #25d366;
            --background-color: #f0f2f5;
            --text-color: #333333;
            --border-color: #e1e1e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 550px;
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--background-color);
            padding-bottom: 15px;
        }

        .header h2 {
            color: var(--primary-color);
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
            font-size: 14px;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.15);
            outline: none;
        }

        .file-drop-area {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 25px;
            border: 2px dashed #b3b3b3;
            border-radius: 8px;
            background-color: #fafafa;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .file-drop-area:hover {
            background-color: #f1f1f1;
            border-color: var(--secondary-color);
        }

        .file-input {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-msg {
            font-size: 14px;
            color: #555;
            text-align: center;
        }

        .preview-container {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
        }

        .preview-item {
            position: relative;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 4px;
            background: #fff;
            text-align: center;
        }

        .preview-item img {
            width: 100%;
            height: 70px;
            object-fit: cover;
            border-radius: 4px;
        }

        .preview-item .file-icon {
            font-size: 30px;
            line-height: 70px;
            color: #777;
        }

        .preview-item .file-name {
            font-size: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 4px;
            color: #666;
        }

        .preview-item .remove-btn {
            position: absolute;
            top: -5px;
            left: -5px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        button.submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 3px 6px rgba(37, 211, 102, 0.2);
        }

        button.submit-btn:hover {
            background-color: #1ebe57;
        }

        button.submit-btn:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #cccccc !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }

        #statusMessage {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-weight: 500;
            display: none;
            font-size: 14px;
        }

        .success { background-color: #d4edda; color: #155724; display: block !important; }
        .error { background-color: #f8d7da; color: #721c24; display: block !important; }
        .loading { background-color: #e2e3e5; color: #383d41; display: block !important; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h2>إرسال واتساب (مرفقات متعددة) 📂</h2>
            <p>يمكنك إدخال المستلمين، نص الرسالة، واختيار صور أو ملفات متعددة</p>
        </div>

        <form id="whatsappForm">
            <div class="form-group">
                <label for="phone">رقم الجوال للمستلم:</label>
                <input type="text" id="phone" placeholder="مثال: 966511111111" required>
            </div>
            
            <div class="form-group">
                <label for="message">نص الرسالة:</label>
                <textarea id="message" rows="4" placeholder="اكتب رسالتك هنا..." required></textarea>
            </div>

            <div class="form-group">
                <label>المرفقات والصور (يمكنك اختيار أكثر من ملف):</label>
                <div class="file-drop-area">
                    <span class="file-msg">📁 اضغط هنا أو اسحب الملفات لرفعها</span>
                    <input class="file-input" type="file" id="mediaFiles" multiple>
                </div>
                <div class="preview-container" id="previewContainer"></div>
            </div>

            <button type="submit" class="submit-btn" id="sendBtn">إرسال عبر الـ API</button>
        </form>

        <div id="statusMessage"></div>
    </div>

    <script>
        // مصفوفة لتخزين الملفات التي تم تحويلها إلى Base64 جاهزة للإرسال
        let uploadedMedia = [];

        // التعامل مع اختيار الملفات وتحويلها
        document.getElementById('mediaFiles').addEventListener('change', function(e) {
            const files = e.target.files;
            const previewContainer = document.getElementById('previewContainer');

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const reader = new FileReader();

                reader.onload = function(event) {
                    // استخراج الـ Base64 النقي بدون مقدمة data:...;base64,
                    const fullBase64 = event.target.result;
                    const base64Data = fullBase64.split(',')[1];

                    // إنشاء كائن الملف بحسب معطيات الـ API الخاصة بك
                    const mediaObject = {
                        mimetype: file.type || "application/octet-stream",
                        filename: file.name,
                        data: base64Data,
                        localUrl: file.type.startsWith('image/') ? fullBase64 : null // للمعاينة فقط
                    };

                    uploadedMedia.push(mediaObject);
                    renderPreviews();
                };

                reader.readAsDataURL(file);
            }
            // تفريغ حقل المدخلات للسماح برفع نفس الملفات مجدداً إن لزم الأمر
            this.value = '';
        });

        // دالة لعرض الملفات المرفوعة وإتاحة إمكانية حذفها
        function renderPreviews() {
            const container = document.getElementById('previewContainer');
            container.innerHTML = '';

            uploadedMedia.forEach((media, index) => {
                const item = document.createElement('div');
                item.className = 'preview-item';

                // زر الحذف
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.type = 'button';
                removeBtn.innerHTML = '&times;';
                removeBtn.onclick = function() {
                    uploadedMedia.splice(index, 1);
                    renderPreviews();
                };
                item.appendChild(removeBtn);

                // المعاينة بناءً على النوع
                if (media.localUrl) {
                    const img = document.createElement('img');
                    img.src = media.localUrl;
                    item.appendChild(img);
                } else {
                    const icon = document.createElement('div');
                    icon.className = 'file-icon';
                    icon.innerHTML = '📄';
                    item.appendChild(icon);
                }

                // اسم الملف
                const nameDiv = document.createElement('div');
                nameDiv.className = 'file-name';
                nameDiv.textContent = media.filename;
                nameDiv.title = media.filename;
                item.appendChild(nameDiv);

                container.appendChild(item);
            });
        }

        // معالجة إرسال النموذج
        document.getElementById('whatsappForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const phone = document.getElementById('phone').value.trim();
            const message = document.getElementById('message').value.trim();
            const statusDiv = document.getElementById('statusMessage');
            const sendBtn = document.getElementById('sendBtn');

            // تفعيل حالة التحميل
            statusDiv.textContent = '⏳ جاري تجهيز المرفقات وإرسال الرسالة...';
            statusDiv.className = 'loading';
            sendBtn.disabled = true;

            // تجهيز المرفقات بدون رابط المعاينة المحلي
            const cleanMedia = uploadedMedia.map(item => ({
                mimetype: item.mimetype,
                filename: item.filename,
                data: item.data
            }));

            // بناء الـ Payload المطلوب للـ API
            const payload = {
                to: [phone],
                body: message,
                media: cleanMedia // سيحتوي على مصفوفة المرفقات (فارغة أو ممتلئة حسب اختيار المستخدم)
            };

            const token = "sau11zbtz1ruma8o2k5tt";

            try {
                const response = await fetch("https://wats-enzn.onrender.com/api/send-message", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    statusDiv.textContent = '✅ تم إرسال الرسالة مع كافة المرفقات بنجاح!';
                    statusDiv.className = 'success';
                    
                    // إعادة تعيين النموذج والمرفقات
                    document.getElementById('whatsappForm').reset();
                    uploadedMedia = [];
                    renderPreviews();
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    statusDiv.textContent = '❌ فشل الإرسال: ' + (errorData.message || 'استجابة غير متوقعة من الخادم');
                    statusDiv.className = 'error';
                }
            } catch (error) {
                statusDiv.textContent = '❌ حدث خطأ أثناء الاتصال بالخادم (تأكد من اتصالك بالإنترنت).';
                statusDiv.className = 'error';
                console.error('Error:', error);
            } finally {
                sendBtn.disabled = false;
            }
        });
    </script>

</body>
</html>
