<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة الربح - Trendyol</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;padding:35px 30px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
h1{font-size:22px;color:#333;text-align:center;margin-bottom:5px}
.sub{font-size:13px;color:#888;text-align:center;margin-bottom:20px}
.formula-badge{background:#f0f0f5;border-radius:10px;padding:10px 14px;font-size:12px;color:#666;text-align:center;margin-bottom:20px;line-height:1.7}
.tabs{display:flex;gap:8px;margin-bottom:22px}
.tab{flex:1;padding:10px;text-align:center;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;border:2px solid #e0e0e0;background:#fff;color:#888;transition:all .2s}
.tab.active{background:#667eea;color:#fff;border-color:#667eea;box-shadow:0 4px 15px rgba(102,126,234,.35)}
.tab:hover:not(.active){border-color:#667eea;color:#667eea}
.panel{display:none}
.panel.active{display:block}
.group{margin-bottom:16px}
label{display:block;font-size:14px;font-weight:600;color:#444;margin-bottom:5px}
label .note{font-weight:400;color:#999;font-size:12px}
.input-wrap{position:relative}
.input-wrap .suffix{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#999;font-size:14px;font-weight:600;pointer-events:none}
input[type=number]{width:100%;padding:13px 16px;border:2px solid #e0e0e0;border-radius:12px;font-size:16px;outline:none;transition:border-color .2s;background:#fafafa;-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]:focus{border-color:#667eea;background:#fff}
.input-wrap input{padding-left:42px}
.results{margin-top:20px;background:linear-gradient(135deg,#f8f9ff 0%,#eef1ff 100%);border-radius:16px;padding:18px 20px}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0}
.result-row:not(:last-child){border-bottom:1px dashed #d0d5f0}
.result-label{font-size:14px;color:#555}
.result-value{font-size:18px;font-weight:700;color:#333}
.result-value.highlight{color:#667eea;font-size:22px}
.result-value.green{color:#2e7d32}
.result-value.purple{color:#764ba2}
.footer{text-align:center;margin-top:16px;font-size:12px;color:#aaa}
input.error{border-color:#e74c3c}
.error-msg{color:#e74c3c;font-size:12px;margin-top:4px;display:none}
.verification{margin-top:14px;padding:12px;background:#fff8e1;border-radius:10px;border:1px solid #ffe082;font-size:13px;color:#795548;text-align:center;display:none}
.verification.show{display:block}
@media(max-width:480px){.card{padding:22px 16px;border-radius:18px}h1{font-size:20px}.result-value{font-size:16px}.result-value.highlight{font-size:19px}}
</style>
</head>
<body>
<div class="card">
<h1>حاسبة الربح 🧮</h1>
<p class="sub">Trendyol — 12% عمولة + 7 ريال شحن</p>
<div class="formula-badge">صافي الربح = (سعر البيع × 0.88) − سعر الشراء − 7</div>

<div class="tabs">
<div class="tab active" data-tab="tab1">حساب سعر البيع</div>
<div class="tab" data-tab="tab2">حساب نسبة الربح</div>
</div>

<!-- ====== TAB 1: Selling Price ====== -->
<div class="panel active" id="tab1">
<div class="group">
<label>سعر الشراء <span class="note">(ريال)</span></label>
<div class="input-wrap">
<input type="number" id="cost1" value="10" step="0.01" min="0">
<span class="suffix">ر.س</span>
</div>
</div>
<div class="group">
<label>نسبة الربح المطلوبة <span class="note">(مثال: 25)</span></label>
<div class="input-wrap">
<input type="number" id="pct1" value="25" step="0.5" min="0" max="87">
<span class="suffix">%</span>
</div>
<div class="error-msg" id="error1">نسبة الربح يجب أن تكون أقل من 88%</div>
</div>
<div class="results">
<div class="result-row"><span class="result-label">سعر البيع المطلوب</span><span class="result-value highlight" id="sell1">—</span></div>
<div class="result-row"><span class="result-label">صافي الربح</span><span class="result-value green" id="profit1">—</span></div>
<div class="result-row"><span class="result-label">نسبة الربح الفعلية</span><span class="result-value purple" id="actual1">—</span></div>
</div>
</div>

<!-- ====== TAB 2: Profit % ====== -->
<div class="panel" id="tab2">
<div class="group">
<label>سعر الشراء <span class="note">(ريال)</span></label>
<div class="input-wrap">
<input type="number" id="cost2" value="40" step="0.01" min="0">
<span class="suffix">ر.س</span>
</div>
</div>
<div class="group">
<label>سعر البيع <span class="note">(ريال)</span></label>
<div class="input-wrap">
<input type="number" id="sell2" value="75" step="0.01" min="0">
<span class="suffix">ر.س</span>
</div>
</div>
<div class="results">
<div class="result-row"><span class="result-label">صافي الربح</span><span class="result-value green" id="net2">—</span></div>
<div class="result-row"><span class="result-label">نسبة الربح</span><span class="result-value purple" id="pct2">—</span></div>
</div>
<div class="verification" id="verify2"></div>
</div>

<div class="footer">Trendyol Pricing Calculator</div>
</div>

<script>
// Tab switching
document.querySelectorAll('.tab').forEach(tab=>{
tab.addEventListener('click',()=>{
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
tab.classList.add('active');
document.getElementById(tab.dataset.tab).classList.add('active');
});
});

// Tab 1
const cost1=document.getElementById('cost1');
const pct1=document.getElementById('pct1');
function calc1(){
const cost=parseFloat(cost1.value)||0;
const rate=(parseFloat(pct1.value)||0)/100;
const err=document.getElementById('error1');
if(rate>=0.88){
cost1.classList.add('error');err.style.display='block';
document.getElementById('sell1').textContent='—';
document.getElementById('profit1').textContent='—';
document.getElementById('actual1').textContent='—';
return;
}
cost1.classList.remove('error');err.style.display='none';
const sell=(cost+7)/(0.88-rate);
const profit=sell*rate;
document.getElementById('sell1').textContent=sell.toFixed(2)+' ر.س';
document.getElementById('profit1').textContent=profit.toFixed(2)+' ر.س';
document.getElementById('actual1').textContent=(rate*100).toFixed(2)+'%';
}
cost1.addEventListener('input',calc1);
pct1.addEventListener('input',calc1);
calc1();

// Tab 2
const cost2=document.getElementById('cost2');
const sell2=document.getElementById('sell2');
function calc2(){
const cost=parseFloat(cost2.value)||0;
const sell=parseFloat(sell2.value)||0;
const net=sell*0.88-cost-7;
const pct=sell>0?(net/sell*100):0;
const netEl=document.getElementById('net2');
const pctEl=document.getElementById('pct2');
const verify=document.getElementById('verify2');
netEl.textContent=net.toFixed(2)+' ر.س';
pctEl.textContent=pct.toFixed(2)+'%';
if(net>=0){
netEl.style.color='#2e7d32';verify.classList.remove('show');
}else{
netEl.style.color='#e74c3c';
verify.textContent='⚠️ خاسر! سعر البيع أقل من التكلفة بعد العمولة والشحن';
verify.classList.add('show');
}
}
cost2.addEventListener('input',calc2);
sell2.addEventListener('input',calc2);
calc2();
</script>
</body>
</html>
